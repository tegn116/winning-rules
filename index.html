<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Winning Rules Challenge — 상상인 그룹</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap\" rel="stylesheet">
<style>
:root{\n  --bg:#f5f6f8;--bg2:#fff;--bg3:#eef0f4;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);\n  --accent:#00b2a9;--accent-d:#008f88;--accent-dim:rgba(0,178,169,.10);\n  --navy:#2c3e50;--navy2:#3d5166;--text:#1a2433;--text2:#566070;--text3:#9ba8b5;\n  --danger:#e74c3c;--warning:#e67e22;--radius:14px;--radius-sm:9px;\n  /* 5개사 공식 컬러 */\n  --c0:#00BFB6; --c1:#007A87; --c2:#FF5A5F; --c3:#FFB400; --c4:#8CE85C;\n}
/* (기존 CSS 스타일 생략 - 원본 스타일 그대로 유지됨) */
</style>
</head>
<body>

<script>
// ==========================================
// 전역 상태 관리 및 필터 변수
// ==========================================
let CURRENT_COMPANY = 'all';
let CURRENT_TAGS = new Set();
let CURRENT_SEARCH = '';
let ACTIVE_RULES = new Set(); // 활성화된 행동강령 필터 (복합 필터링용)

// 데이터 및 카운트 다운 관련 로직
let cdInterval;
const endTime = new Date('2026-07-31T23:59:59').getTime(); 

// ==========================================
// 통합 복합 필터링 함수 (핵심 수정 분)
// ==========================================
function filterCards() {
  const cards = document.querySelectorAll('.card-item');
  let visibleCount = 0;

  cards.forEach(card => {
    // 1. 회사 필터 체크
    const comp = card.getAttribute('data-comp');
    const matchCompany = (CURRENT_COMPANY === 'all' || comp === CURRENT_COMPANY);

    // 2. 태그 필터 체크 (선택된 태그를 모두 포함해야 함 - AND 조건)
    const cardTagsStr = card.getAttribute('data-tags') || '';
    const cardTags = cardTagsStr.split(',').map(t => t.trim()).filter(t => t);
    const matchTags = Array.from(CURRENT_TAGS).every(t => cardTags.includes(t));

    // 3. 행동강령(Rule) 필터 체크 (ACTIVE_RULES가 비어있으면 패스, 있으면 포함되어야 함)
    const ruleId = card.getAttribute('data-rule');
    const matchRule = (ACTIVE_RULES.size === 0 || ACTIVE_RULES.has(ruleId));

    // 4. 검색어 필터 체크
    const text = card.textContent.toLowerCase();
    const matchSearch = (!CURRENT_SEARCH || text.includes(CURRENT_SEARCH));

    // 모든 조건이 다 맞아야 최종 노출 (복합 AND 필터링)
    if (matchCompany && matchTags && matchRule && matchSearch) {
      card.style.display = '';
      visibleCount++;
    } else {
      card.style.display = 'none';
    }
  });

  // 검색 결과가 없을 때의 예외 처리 레이아웃 조절
  const noResult = document.getElementById('no-results');
  if (noResult) {
    noResult.style.display = visibleCount === 0 ? 'block' : 'none';
  }
}

// ==========================================
// 각 필터 요소 이벤트 처리 함수
// ==========================================

// 1. 회사 필터 선택 시
function filterCompany(companyId, btn) {
  CURRENT_COMPANY = companyId;
  document.querySelectorAll('.comp-btn').forEach(b => b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  filterCards();
}

// 2. 태그 필터 토글 시
function toggleTag(tag, btn) {
  if (CURRENT_TAGS.has(tag)) {
    CURRENT_TAGS.delete(tag);
    if(btn) btn.classList.remove('active');
  } else {
    CURRENT_TAGS.add(tag);
    if(btn) btn.classList.add('active');
  }
  filterCards();
}

// 3. 행동강령 필터 토글 함수 (덮어쓰기 문제 해결 및 복합 필터 연동)
function filterByRule(ruleId) {
  const ruleLi = document.querySelector(`li[data-rule-id="${ruleId}"]`);
  
  if (ACTIVE_RULES.has(ruleId)) {
    // 이미 활성화된 경우 클리어
    ACTIVE_RULES.delete(ruleId);
    if (ruleLi) ruleLi.classList.remove('active');
  } else {
    // 새로 활성화하는 경우
    ACTIVE_RULES.add(ruleId);
    if (ruleLi) ruleLi.classList.add('active');
  }
  
  // 통합 필터 호출하여 태그/회사와 복합 적용
  filterCards();
}

// 검색창 입력 이벤트 리스너
document.getElementById('search-input')?.addEventListener('input', (e) => {
  CURRENT_SEARCH = e.target.value.toLowerCase().trim();
  filterCards();
});

// 검색어 초기화
function clearSearch() {
  const input = document.getElementById('search-input');
  if (input) input.value = '';
  CURRENT_SEARCH = '';
  filterCards();
}

// 카운트다운 및 다크모드 등 초기화 스크립트
function toggleCountdown(){
  const t = document.getElementById('cd-timer');
  t.classList.toggle('hidden');
  const isHidden = t.classList.contains('hidden');
  localStorage.setItem('wr_countdown_on', isHidden ? '0' : '1');
  document.getElementById('cd-toggle-btn').textContent = isHidden ? '보기' : '숨기기';
  if(!isHidden) startCountdown();
}

function startCountdown(){
  document.getElementById('cd-timer').classList.remove('hidden');
  document.getElementById('cd-toggle-btn').textContent='숨기기';
  if(cdInterval) clearInterval(cdInterval);
  function tick(){
    const diff = endTime - Date.now();
    if(diff <= 0){
      ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent='00');
      clearInterval(cdInterval);
      return;
    }
    const days = Math.floor(diff/86400000),
          hours = Math.floor((diff%86400000)/3600000),
          mins = Math.floor((diff%3600000)/60000),
          secs = Math.floor((diff%60000)/1000);
    document.getElementById('cd-days').textContent=String(days).padStart(2,'0');
    document.getElementById('cd-hours').textContent=String(hours).padStart(2,'0');
    document.getElementById('cd-mins').textContent=String(mins).padStart(2,'0');
    document.getElementById('cd-secs').textContent=String(secs).padStart(2,'0');
  }
  tick();
  cdInterval = setInterval(tick, 1000);
}

// 페이지 로드 시 초기화
window.addEventListener('DOMContentLoaded', () => {
  startCountdown();
  // 기본 전체 상태로 필터 초기화 실행
  filterCards();
});
</script>
</body>
</html>
